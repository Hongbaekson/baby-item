services:
  euni-baby-items:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: euni-baby-items-web
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    pids_limit: 100
    ports:
      - "${APP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
