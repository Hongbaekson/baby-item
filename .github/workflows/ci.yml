name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  verify:
    name: Verify app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check app data
        run: npm run data:check

      - name: Check price sync readiness
        run: npm run price:check-readiness

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Package build artifact
        run: |
          mkdir -p artifacts
          artifact="euni-baby-items-${GITHUB_SHA}.tar.gz"
          tar -C dist -czf "artifacts/${artifact}" .
          (
            cd artifacts
            sha256sum "${artifact}" > SHA256SUMS
          )
          cat artifacts/SHA256SUMS

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: euni-baby-items-${{ github.sha }}
          path: |
            artifacts/euni-baby-items-${{ github.sha }}.tar.gz
            artifacts/SHA256SUMS
          retention-days: 14

      - name: Attest build artifact
        if: github.event_name == 'push'
        uses: actions/attest@v4
        with:
          subject-checksums: artifacts/SHA256SUMS

      - name: Validate Docker Compose config
        run: docker compose config
